name: qwertystock-installer

on:
  push:
    branches: [main]
    paths:
      - "installer/**"
  workflow_dispatch:

jobs:
  build-win-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish self-contained single-file (win-x64)
        run: |
          dotnet publish installer/QwertyStock.Bootstrapper/QwertyStock.Bootstrapper.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: SHA256 of qwertystock.exe
        run: |
          EXE=installer/QwertyStock.Bootstrapper/bin/Release/net9.0-windows/win-x64/publish/qwertystock.exe
          sha256sum "$EXE"

      - uses: actions/upload-artifact@v4
        with:
          name: qwertystock-win-x64
          path: |
            installer/QwertyStock.Bootstrapper/bin/Release/net9.0-windows/win-x64/publish/qwertystock.exe
